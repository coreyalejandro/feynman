name: Governance Verify (I’m Just a Build)

on:
  pull_request:
  push:

jobs:
  verify-governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify export bundle checker
        run: python3 export/tlc/checkers/verify_build_contract_packets.py
      - name: Verify governed packets
        run: python3 scripts/verify_governance_packets.py

